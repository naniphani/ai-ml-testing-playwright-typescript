name: AI ML Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ai-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mock AI tests
        run: |
          npx playwright test tests/ai/hallucination.spec.ts --project=chromium
          npx playwright test tests/ai/prompt-injection.spec.ts --project=chromium
          npx playwright test tests/ai/rag-validation.spec.ts --project=chromium

      - name: Run Dify RAG tests
        run: npx playwright test tests/ai/rag-dify-api.spec.ts --project=chromium
        env:
          DIFY_API_URL: ${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/